<!DOCTYPE html>
<html>
<body>

<form action="/submit_registration" method="post">
  <h2>Hackathon Registration Form</h2>

  <label for="firstName">First Name:</label><br>
  <input type="text" id="firstName" name="firstName" required><br><br>

  <label for="lastName">Last Name:</label><br>
  <input type="text" id="lastName" name="lastName" required><br><br>

  <label for="email">Email:</label><br>
  <input type="email" id="email" name="email" required><br><br>

  <label for="phone">Phone Number (Optional):</label><br>
  <input type="tel" id="phone" name="phone" required><br><br>

  <label for="teamName">Team Name (Optional):</label><br>
  <input type="text" id="teamName" name="teamName" required><br><br>

  <label for="skills">Skills/Technologies (e.g., Python, JavaScript, AI):</label><br>
  <textarea id="skills" name="skills" rows="4" cols="50" required></textarea><br><br>

  <label for="comments">Any other comments or requests?</label><br>
  <textarea id="comments" name="comments" rows="4" cols="50" required></textarea><br><br>

  <input type="submit" value="Register">
</form><br><br>

<style>
  body {

    background-color: #fff;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    max-width: 500px;
    margin: auto;
  }
  h2 {
    text-align: center;
    color: #333;
  }
  label {
    font-weight: bold;
    margin-bottom: 5px;
    display: block;
  }
  input[type="text"],
  input[type="email"],
  input[type="tel"],
  textarea {
    width: calc(100% - 20px);
    padding: 10px;
    margin-bottom: 15px;
    border: 1px solid #ddd;
    border-radius: 4px;
    box-sizing: border-box;
  }
  input[type="submit"] {
    background-color: #007bff;
    color: white;
    padding: 10px 15px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 16px;
    width: 100%;
  }
  input[type="submit"]:hover {
    background-color: #0056b3;
  }
