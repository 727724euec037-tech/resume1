<!DOCTYPE html>
<html>
<head>
    <title>Symposium Registration</title>
</head>
<body>

<center>
    <h1>Symposium Registration</h1>
    <link rel="stylesheet" href="style2.css">
    <a href="danuport.html" target="_blank">Resume</a>
    <form id="regForm">
        <table border="1" cellpadding="8">
            <tr>
                <td>Name</td>
                <td><input type="text" id="name" required></td>
            </tr>
            <tr>
                <td>Email</td>
                <td><input type="email" id="email" required></td>
            </tr>
            <tr>
                <td>Roll No</td>
                <td><input type="text" id="rollno" required></td>
            </tr>
            <tr>
                <td>Department</td>
                <td>
                    <select id="dept" required>
                        <option value="">Select Department</option>
                        <option>ECE</option>
                        <option>CSE</option>
                        <option>IT</option>
                        <option>EEE</option>
                        <option>MECH</option>
                    </select>
                </td>
            </tr>
        </table>
         
        <br>
        <button type="submit">Register</button>
    </form>
     <img src= "C:\Users\Dhanu sree\Downloads\ChatGPT Image Jun 18, 2026, 08_46_39 PM.png" alt="Symposium" width="500">
    <br><br>
    <tr>
    <td>Event</td>
    <td>
        <select id="event" required>
            <option value="">Select Event</option>
            <option>Paper Presentation</option>
            <option>Project Expo</option>
            <option>Technical Quiz</option>
            <option>Debugging</option>
            <option>Web Design</option>
            <option>Poster Presentation</option>
        </select>
    </td>
</tr>
  
     
  
   


    <h2>Registered Participants</h2>

    <table border="1" cellpadding="10" id="dataTable">
        <tr>
            <th>S.No</th>
            <th>Name</th>
            <th>Email</th>
            <th>Roll No</th>
            <th>Department</th>
        </tr>
    </table>

    <br>

    <h3>Total Registered Members: <span id="count">0</span></h3>
    
</center>

<script>

let count = 0;

document.getElementById("regForm").addEventListener("submit", function(event) {
    event.preventDefault();

    count++;

    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let rollno = document.getElementById("rollno").value;
    let dept = document.getElementById("dept").value;

    let table = document.getElementById("dataTable");

    let row = table.insertRow();

    row.insertCell(0).innerHTML = count;
    row.insertCell(1).innerHTML = name;
    row.insertCell(2).innerHTML = email;
    row.insertCell(3).innerHTML = rollno;
    row.insertCell(4).innerHTML = dept;

    document.getElementById("count").innerHTML = count;

    document.getElementById("regForm").reset();
});
</script>

</body>
</html>
