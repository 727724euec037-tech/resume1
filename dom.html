<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 id="h1">DOM</h1>
    
    <input type="text" id="input">
    <input type="text" id="input2">
    <button type="submit" id="btn" onclick="addNum()">ADD</button>

    <div id="show">

    </div>
    <form onsubmit="saveData()">
        <label>Name:</label>
    <input type="text" id="name">
    <label>age:</label>
    <input type="text" id="age">
<button type="submit" id="btn">submit</button>
    </form>
    <script>
        function addNum()
        {
            let val1=Number(document.getElementById("input").value)
        let val2=Number(document.getElementById("input2").value)
        let result=val1+val2;
        let final=document.getElementById("show")

        final.innerHTML=result
        }
        function saveData()
        {
            let n=document.getElementById("name").value
            let b=document.getElementById("age").value
            localStorage.setItem("name",n);
            localStorage.setItem("age",b);
            console.log(localStorage.getItem("name"))
            console.log(localStorage.getItem("age"))
            alert("save the data")
        }
        
    </script>

</body>
</html>
